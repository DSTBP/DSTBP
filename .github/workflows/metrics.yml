name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # 每天凌晨自动更新
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # 你需要在 Settings 里创建一个个人访问令牌 (PAT)

          # 基本配置
          user: DSTBP
          template: classic
          base: header, activity, community, repositories, metadata
          
          # 语言分析 (适合展示你的多语言能力)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          
          # 详细统计 (即你想要的 Stats Words 部分)
          plugin_followup: yes
          plugin_followup_sections: user
          plugin_lines: yes
